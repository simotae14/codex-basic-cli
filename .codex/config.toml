model = "gpt-5.5"
model_reasoning_effort = "medium"

# ==============================================================================
# PERMISSIONS & SAFETY (DANGER ZONE)
# ==============================================================================

# "never" = The agent executes commands and edits files immediately without asking.
# It will only stop if it encounters an error it cannot resolve.
approval_policy = "never"
# Alternatives:
# approval_policy = "on-request"  # (Default) Agent runs safe commands automatically but asks when necessary.
# approval_policy = "on-failure"  # Agent runs automatically but pauses if a command fails/errors.
# approval_policy = "untrusted"   # Paranoid mode: Agent asks for permission for almost every action.

# "danger-full-access" = COMPLETELY DISABLES THE SANDBOX.
# The agent can read/write any file on your computer (e.g., ~/.ssh, /etc) and
# has full unrestricted network access.
sandbox_mode = "danger-full-access"
# Alternatives:
# sandbox_mode = "workspace-write" # (Default) Can only edit files inside the project folder. Blocked from system paths.
# sandbox_mode = "read-only"       # Can read files but cannot edit them or run commands.

# ==============================================================================
# CONNECTIVITY
# ==============================================================================

# "live" = The agent searches the real-time internet.
# (Defaults to "live" automatically when sandbox is set to "danger-full-access")
web_search = "live"
# Alternatives:
# web_search = "cached"    # (Default) Uses OpenAI's cached index (safer, prevents visiting malicious sites).
# web_search = "disabled"  # No web search capability.

# ==============================================================================
# ENVIRONMENT VARIABLES
# ==============================================================================

# [shell_environment_policy]
# "all" = Passes ALL your environment variables (API keys, tokens) to the agent's shell.
# inherit = "all"
# Alternatives:
# inherit = "core"  # Passes only basic vars like PATH, HOME, USER.
# inherit = "none"  # Starts with a completely empty environment.

# If you want to use "core" but pass specific secrets, use `include_only`:
# include_only = ["PATH", "HOME", "AWS_PROFILE", "OPENAI_API_KEY"]